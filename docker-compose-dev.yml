services:
  kiro2api:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: kiro2api
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/docker-entrypoint.sh"]
    ports:
      - "5656:8080"
    environment:
      # ============================================================================
      # Token 管理配置
      # ============================================================================
      # Token配置 (JSON格式，支持多账号池和双认证方式)
      # 支持文件路径或 JSON 字符串
      - KIRO_AUTH_TOKEN=${KIRO_AUTH_TOKEN:-/app/tokens.json}

      # Token选择策略: sequential(顺序), random(随机), round_robin(轮询)
      # 推荐使用 round_robin 实现负载均衡
      - TOKEN_SELECTION_STRATEGY=${TOKEN_SELECTION_STRATEGY:-round_robin}

      # RoundRobin 活跃池配置（用于 round_robin 策略）
      # 维护固定数量的健康账号活跃池，账号出问题时立即替换
      # 0 = 使用全部账号轮询（默认），N > 0 = 维护 N 个账号的活跃池
      # 建议值：总账号数的 1/3 到 1/2，例如：15个账号设置为5，30个账号设置为10
      - KIRO_BATCH_SIZE=${KIRO_BATCH_SIZE:-0}

      # ============================================================================
      # 认证配置
      # ============================================================================
      # 客户端认证Token（用于访问 /v1/* API）
      - KIRO_CLIENT_TOKEN=${KIRO_CLIENT_TOKEN:-Wang1234}

      # 管理员认证Token（用于访问 /v1/admin/* 管理接口）
      # 不设置则禁用管理 API
      - KIRO_ADMIN_TOKEN=${KIRO_ADMIN_TOKEN:-Wang1234}

      # ============================================================================
      # 服务配置
      # ============================================================================
      - PORT=${PORT:-8080}
      - GIN_MODE=${GIN_MODE:-release}

      # ============================================================================
      # 日志配置
      # ============================================================================
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - LOG_CONSOLE=${LOG_CONSOLE:-true}
      - LOG_FILE=${LOG_FILE:-}

      # ============================================================================
      # 工具配置
      # ============================================================================
      # 工具描述的最大长度（字符数，默认: 10000）
      - MAX_TOOL_DESCRIPTION_LENGTH=${MAX_TOOL_DESCRIPTION_LENGTH:-10000}

      # ============================================================================
      # 代理池配置
      # ============================================================================
      # 代理池配置（支持文件路径或逗号分隔的代理列表）
      # 文件路径示例: /app/proxies.txt
      # 直接配置示例: http://user:pass@proxy1:8080,http://user:pass@proxy2:8080
      - KIRO_PROXY_POOL=${KIRO_PROXY_POOL:-}

      # 健康检查URL（可选，默认 http://cp.cloudflare.com/generate_204）
      - KIRO_PROXY_HEALTH_CHECK_URL=${KIRO_PROXY_HEALTH_CHECK_URL:-}

      # 健康检查间隔（可选，默认 60s）
      - KIRO_PROXY_HEALTH_CHECK_INTERVAL=${KIRO_PROXY_HEALTH_CHECK_INTERVAL:-}

      # 最大失败次数（可选，默认 3 次）
      - KIRO_PROXY_MAX_FAILURES=${KIRO_PROXY_MAX_FAILURES:-}

      # ============================================================================
      # IP 并发限制配置
      # ============================================================================
      # 每个 IP 最大并发请求数（默认 5）
      - KIRO_MAX_CONCURRENT_PER_IP=${KIRO_MAX_CONCURRENT_PER_IP:-5}

      # IP 并发排队等待超时时间（默认 60s，超时返回 429）
      - KIRO_IP_ACQUIRE_TIMEOUT=${KIRO_IP_ACQUIRE_TIMEOUT:-60s}

    volumes:
      # 启动自愈脚本（处理 tokens.json 目录挂载问题）
      - ./docker-entrypoint.sh:/docker-entrypoint.sh:ro
      # AWS SSO 缓存目录（持久化设备指纹）
      - aws_sso_cache:/home/appuser/.aws/sso/cache

      # Token 配置文件（可写，支持 WebUI 导入持久化）
      # 注意：宿主机 tokens.json 若不存在，Docker 会创建同名“目录”。
      # 本项目会自动将真实配置写入到 ./tokens.json/tokens.json（仍可持久化，但位置会变化）。
      # 可选：首次启动前执行 `echo '[]' > tokens.json`，避免目录/文件混淆。
      - ./tokens.json:/app/tokens.json

      # 代理池配置文件（可选，只读挂载）
      # 如果使用文件配置代理池，取消注释以下行
      # - ./proxies.txt:/app/proxies.txt:ro

    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # 资源限制（可选，根据实际需求调整）
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '2'
    #       memory: 512M
    #     reservations:
    #       cpus: '0.5'
    #       memory: 256M

volumes:
  aws_sso_cache:
    driver: local
